      bgColor: '#f0eff5'
      defaultDialColors:
        - '#2e7de9'
        - '#8f4961'
      defaultChartColors:
        - '#2e7de9'
        - '#8f4961'
    table:
      fgColor: '#383e5d'
      bgColor: '#f0eff5'
      cursorFgColor: '#f0eff5'
      cursorBgColor: '#2e7de9'
      markColor: '#8e6c2a'
      header:
        fgColor: '#007a99'
        bgColor: '#f0eff5'
        sorterColor: '#488348'
