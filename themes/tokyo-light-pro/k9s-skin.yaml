        fgColor: '#2e7de9'
        bgColor: '#f0eff5'
        toggleOnColor: '#488348'
        toggleOffColor: '#8f4961'
    help:
      fgColor: '#383e5d'
      bgColor: '#f0eff5'
      keyColor: '#007a99'
      numKeyColor: '#488348'
      sectionColor: '#7669d6'
    filter:
      fgColor: '#383e5d'
      bgColor: '#f0eff5'
      labelColor: '#2e7de9'
      fieldColor: '#488348'
      inverse:
        fgColor: '#f0eff5'
        bgColor: '#007a99'
