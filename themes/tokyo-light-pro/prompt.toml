# Starship Theme: Tokyo Night Day Pro (Light)
#######################################################################
### A Tokyo Night Day (Light) theme for Starship                   ###
### Based on: https://starship.rs/presets/tokyo-night.html         ###
#######################################################################
"$schema" = 'https://starship.rs/config-schema.json'
command_timeout = 3000

format = """
[‚ĖĎ‚Ėí‚Ėď](#2e7de9)\
${custom.work}\
[ ÓúĎ ](bg:#2e7de9 fg:#e1e2e7)\
[Óāī](bg:#7aa2f7 fg:#2e7de9)\
$directory\
[Óāī](fg:#7aa2f7 bg:#a8aecb)\
$git_branch\
$git_status\
[Óāī](fg:#a8aecb bg:#d5d6db)\
$java\
$nodejs\
$rust\
$golang\
$php\
$kubernetes\
${custom.zsh_env_context}\
[Óāī](fg:#d5d6db bg:#e1e2e7)\
$time\
[Óāī ](fg:#e1e2e7)\
\n$character"""

[directory]
style = "fg:#1a1b26 bg:#7aa2f7"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "

[git_branch]
symbol = "Ôźė"
style = "bg:#a8aecb"
format = '[[ $symbol $branch ](fg:#3760bf bg:#a8aecb)]($style)'

[git_status]
style = "bg:#a8aecb"
format = '[[($all_status$ahead_behind )](fg:#3760bf bg:#a8aecb)]($style)'

[nodejs]
symbol = "Óúė"
style = "bg:#d5d6db"
format = '[[ $symbol ($version) ](fg:#587539 bg:#d5d6db)]($style)'

[rust]
symbol = "Óě®"
style = "bg:#d5d6db"
format = '[[ $symbol ($version) ](fg:#f52a65 bg:#d5d6db)]($style)'

[golang]
symbol = "Óėß"
style = "bg:#d5d6db"
format = '[[ $symbol ($version) ](fg:#007197 bg:#d5d6db)]($style)'

[php]
symbol = "Óėą"
style = "bg:#d5d6db"
format = '[[ $symbol ($version) ](fg:#9854f1 bg:#d5d6db)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#e1e2e7"
format = '[[  $time ](fg:#6172b0 bg:#e1e2e7)]($style)'

[java]
symbol = "‚ėē"
style = "bg:#d5d6db"
format = '[[ $symbol ($version) ](fg:#f52a65 bg:#d5d6db)]($style)'
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts", ".java-version"]

# Kubernetes natif desactive ‚ÄĒ remplace par [custom.zsh_env_context] (plus rapide, plus compact)
[kubernetes]
disabled = true

# === Module Custom: Contexte Work ===
[custom.work]
description = "Indicateur contexte Work"
command = "echo 'ůįčú'"
when = "test -f ~/.zsh_env/.work_context_cache && tail -1 ~/.zsh_env/.work_context_cache | grep -q true"
format = "[$output ](bg:#2e7de9 fg:#ff6600)"
shell = ["bash", "--noprofile", "--norc"]

# === Module Custom: Contexte Dev (Kube) ===
[custom.zsh_env_context]
description = "Kubernetes context and namespace via zsh-env-cli"
command = "zsh-env-cli context"
when = "test -x ${HOME}/.local/bin/zsh-env-cli"
format = "[[ $output ](fg:#326ce5 bg:#d5d6db)]($style)"
style = "bg:#d5d6db"
shell = ["bash", "--noprofile", "--norc"]
