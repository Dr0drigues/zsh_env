# Starship Theme: Tokyo Night Pro
#######################################################################
### A Tokyo Night theme for Starship                                ###
### source: https://starship.rs/presets/tokyo-night.html            ###
#######################################################################
"$schema" = 'https://starship.rs/config-schema.json'
command_timeout = 3000

format = """
[ÔûæÔûÆÔûô](#a3aed2)\
${custom.work}\
[ ¯£æ ](bg:#a3aed2 fg:#090c0c)\
[¯é┤](bg:#769ff0 fg:#a3aed2)\
$directory\
[¯é┤](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[¯é┤](fg:#394260 bg:#212736)\
$java\
$nodejs\
$rust\
$golang\
$php\
\$kubernetes\\\n${custom.zproject}${custom.zsh_env_context}\\
[¯é┤](fg:#212736 bg:#1d2230)\
$time\
[¯é┤ ](fg:#1d2230)\
\n$character"""

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "

[git_branch]
symbol = "´Éÿ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[nodejs]
symbol = "¯£ÿ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "¯×¿"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "¯ÿº"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "¯ÿê"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ ´É║ $time ](fg:#a0a9cb bg:#1d2230)]($style)'

[java]
symbol = "Ôÿò"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#f7768e bg:#212736)]($style)'
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts", ".java-version"]

# Kubernetes natif desactive ÔÇö remplace par [custom.zsh_env_context] (plus rapide, plus compact)
[kubernetes]
disabled = true

# === Module Custom: Contexte Work ===
[custom.work]
description = "Indicateur contexte Work"
command = "echo '¾░ï£'"
when = "test -f ~/.zsh_env/.work_context_cache && tail -1 ~/.zsh_env/.work_context_cache | grep -q true"
format = "[$output ](bg:#a3aed2 fg:#e0af68)"
shell = ["bash", "--noprofile", "--norc"]

# === Module Custom: Projet actif (zproject) ===
[custom.zproject]
description = "Projet zproject actif"
command = 'echo "${ZPROJECT_NAME}${ZPROJECT_ENV:+/${ZPROJECT_ENV}}"'
when = 'test -n "$ZPROJECT_NAME"'
format = "[ ¾░Åù $output ](fg:#bb9af7 bg:#212736)"
shell = ["bash", "--noprofile", "--norc"]

# === Module Custom: Contexte Dev (Kube) ===
[custom.zsh_env_context]
description = "Kubernetes context and namespace via zsh-env-cli"
command = "zsh-env-cli context"
when = "test -x ${HOME}/.local/bin/zsh-env-cli"
format = "[[ $output ](fg:#7dcfff bg:#212736)]($style)"
style = "bg:#212736"
shell = ["bash", "--noprofile", "--norc"]
