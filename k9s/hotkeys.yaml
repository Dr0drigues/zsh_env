# k9s hotkeys — raccourcis de navigation rapide
# Déployer avec : kube_k9s_setup
hotKeys:
  shift-p:
    shortCut: Shift-P
    description: Pods
    command: pods
  shift-d:
    shortCut: Shift-D
    description: Deployments
    command: deployments
  shift-c:
    shortCut: Shift-C
    description: ConfigMaps
    command: configmaps
  shift-e:
    shortCut: Shift-E
    description: Events
    command: events
  shift-i:
    shortCut: Shift-I
    description: Ingresses
    command: ingresses
