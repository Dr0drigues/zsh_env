      fgColor: '#383e5d'
      bgColor: '#f0eff5'
      cursorColor: '#2e7de9'
      graphicColor: '#2e7de9'
      showIcons: false
    yaml:
      keyColor: '#2e7de9'
      colonColor: '#969cb4'
      valueColor: '#488348'
      headerColor: '#007a99'
    logs:
      fgColor: '#383e5d'
      bgColor: '#f0eff5'
