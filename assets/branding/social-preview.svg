<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <filter id="forgeGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <radialGradient id="emberGlow" cx="0.34" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#ff8a3d" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ff8a3d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- fond charbon -->
  <rect width="1280" height="640" fill="#1a1613"/>
  <!-- lueur de forge -->
  <rect width="1280" height="640" fill="url(#emberGlow)"/>

  <!-- mark enclume -->
  <svg x="215" y="175" width="300" height="300" viewBox="0 0 128 128">
    <ellipse cx="64" cy="42" rx="42" ry="19" fill="#ff8a3d" opacity="0.45" filter="url(#forgeGlow)"/>
    <polygon points="10,48 28,38 100,38 100,58 78,58 76,84 94,84 97,106 31,106 34,84 52,84 50,58 28,58" fill="#5a6670"/>
    <polygon points="10,48 28,38 100,38 100,58 28,58" fill="#8896a3"/>
    <rect x="28" y="38" width="72" height="4.5" fill="#ff8a3d"/>
    <polygon points="10,48 28,38 28,40.5 13.5,48.5" fill="#5fae9f" opacity="0.85"/>
    <polygon points="30,11 34,20 30,29 26,20" fill="#ffd479"/>
    <circle cx="44" cy="13" r="2.4" fill="#ffd479"/>
    <circle cx="19" cy="28" r="1.7" fill="#ff8a3d"/>
  </svg>

  <!-- wordmark -->
  <text x="560" y="355" font-family="Avenir Next, Avenir, sans-serif" font-weight="700" font-size="150">
    <tspan fill="#ff8a3d">z</tspan><tspan fill="#d8cdbf">anvil</tspan>
  </text>
  <!-- tagline (police terminal) -->
  <text x="566" y="430" font-family="JetBrains Mono, monospace" font-size="32" letter-spacing="10" fill="#6b6055">CRAFT YOUR SHELL</text>
</svg>
