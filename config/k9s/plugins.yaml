# k9s plugins — raccourcis vers outils externes
# Déployer avec : kube_k9s_setup
# Syntaxe : les variables ($NAME, $NAMESPACE, $CONTEXT, $POD) sont substituées par k9s
# Pattern bash -c : '"$@" | pipe' suivi de dummy-arg puis les args réels
plugins:
  # Logs JSON depuis un pod (toutes les containers)
  log-json-pod:
    shortCut: Shift-L
    description: Logs JSON formatés (humanlog)
    scopes:
      - po
    command: bash
    background: false
    confirm: false
    args:
      - -c
      - '"$@" | $ZANVIL_DIR/scripts/k9s-log-fmt.sh | less -R +G'
      - dummy-arg
      - kubectl
      - logs
      - $NAME
      - -n
      - $NAMESPACE
      - --context
      - $CONTEXT
      - --tail
      - "500"
      - --all-containers=true

  # Logs JSON depuis une container spécifique
  # Note: dans le scope containers, $NAME = container, $POD = pod
  log-json-container:
    shortCut: Shift-L
    description: Logs JSON formatés (humanlog)
    scopes:
      - containers
    command: bash
    background: false
    confirm: false
    args:
      - -c
      - '"$@" | $ZANVIL_DIR/scripts/k9s-log-fmt.sh | less -R +G'
      - dummy-arg
      - kubectl
      - logs
      - -c
      - $NAME
      - $POD
      - -n
      - $NAMESPACE
      - --context
      - $CONTEXT
      - --tail
      - "500"

  # YAML live formaté via delta (ou bat/less en fallback) — Shift-Y selon la vue active
  diff-yaml-deploy:
    shortCut: Shift-Y
    confirm: false
    description: "YAML via delta"
    scopes:
      - deployments
    command: bash
    background: false
    args:
      - -c
      - "if command -v delta &>/dev/null; then kubectl get deployment $NAME -n $NAMESPACE --context $CONTEXT -o yaml | delta; elif command -v bat &>/dev/null; then kubectl get deployment $NAME -n $NAMESPACE --context $CONTEXT -o yaml | bat -l yaml; else kubectl get deployment $NAME -n $NAMESPACE --context $CONTEXT -o yaml | less; fi"

  diff-yaml-pod:
    shortCut: Shift-Y
    confirm: false
    description: "YAML via delta"
    scopes:
      - pods
    command: bash
    background: false
    args:
      - -c
      - "if command -v delta &>/dev/null; then kubectl get pod $NAME -n $NAMESPACE --context $CONTEXT -o yaml | delta; elif command -v bat &>/dev/null; then kubectl get pod $NAME -n $NAMESPACE --context $CONTEXT -o yaml | bat -l yaml; else kubectl get pod $NAME -n $NAMESPACE --context $CONTEXT -o yaml | less; fi"

  diff-yaml-configmap:
    shortCut: Shift-Y
    confirm: false
    description: "YAML via delta"
    scopes:
      - configmaps
    command: bash
    background: false
    args:
      - -c
      - "if command -v delta &>/dev/null; then kubectl get configmap $NAME -n $NAMESPACE --context $CONTEXT -o yaml | delta; elif command -v bat &>/dev/null; then kubectl get configmap $NAME -n $NAMESPACE --context $CONTEXT -o yaml | bat -l yaml; else kubectl get configmap $NAME -n $NAMESPACE --context $CONTEXT -o yaml | less; fi"

  # Rollout restart d'un deployment — Shift-R (avec confirmation)
  restart-deploy:
    shortCut: Shift-R
    confirm: true
    description: "Rollout restart"
    scopes:
      - deployments
    command: bash
    background: false
    args:
      - -c
      - "kubectl rollout restart deployment/$NAME -n $NAMESPACE --context $CONTEXT && echo 'Restarted deployment/$NAME'"
