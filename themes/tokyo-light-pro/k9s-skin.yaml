# themes/tokyo-light-pro/k9s-skin.yaml
# Skin k9s aligné sur la palette tokyo-light-pro (haut contraste)
k9s:
  body:
    fgColor: '#383e5d'
    bgColor: '#f0eff5'
    logoColor: '#007a99'
  prompt:
    fgColor: '#383e5d'
    bgColor: '#f0eff5'
    suggestColor: '#007a99'
  info:
    fgColor: '#007a99'
    bgColor: '#f0eff5'
  dialog:
    fgColor: '#383e5d'
    bgColor: '#d5d6db'
    buttonFgColor: '#f0eff5'
    buttonBgColor: '#2e7de9'
    buttonFocusFgColor: '#f0eff5'
    buttonFocusBgColor: '#488348'
    labelFgColor: '#8e6c2a'
    fieldFgColor: '#383e5d'
  frame:
    border:
      fgColor: '#969cb4'
      focusColor: '#2e7de9'
    menu:
      fgColor: '#383e5d'
      keyColor: '#007a99'
      numKeyColor: '#488348'
    crumbs:
      fgColor: '#f0eff5'
      bgColor: '#2e7de9'
      activeColor: '#488348'
    status:
      newColor: '#488348'
      modifyColor: '#2e7de9'
